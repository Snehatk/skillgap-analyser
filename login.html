<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkillBridge — Login</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <a href="index.html" class="logo">⚡ SkillBridge</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="upload.html">Analyze</a>
      <a href="dashboard.html">Dashboard</a>
    </nav>
  </header>

  <!-- LOGIN / SIGNUP SECTION -->
  <section class="auth-section">
    <div class="auth-container">

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <div class="auth-form" id="login-form">
        <h2 class="section-title">Welcome back 👋</h2>
        <p class="section-sub">Login to access your skill dashboard</p>

        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="login-email" placeholder="you@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••"/>
        </div>

        <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">
          Login →
        </button>

        <p class="auth-switch">
          Don't have an account?
          <a href="#" onclick="switchTab('signup')">Sign up free</a>
        </p>
      </div>

      <!-- SIGNUP FORM -->
      <div class="auth-form hidden" id="signup-form">
        <h2 class="section-title">Create account 🚀</h2>
        <p class="section-sub">Start analyzing your skill gaps today</p>

        <div class="form-group">
          <label>Full name</label>
          <input type="text" id="signup-name" placeholder="Neha Sharma"/>
        </div>
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="signup-email" placeholder="you@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Create a password"/>
        </div>

        <button class="btn btn-primary" style="width:100%" onclick="handleSignup()">
          Create Account →
        </button>

        <p class="auth-switch">
          Already have an account?
          <a href="#" onclick="switchTab('login')">Login here</a>
        </p>
      </div>

      <!-- SUCCESS MESSAGE (hidden by default) -->
      <div class="auth-success hidden" id="auth-success">
        <div class="success-icon">✅</div>
        <h3>You're in!</h3>
        <p>Redirecting to your dashboard...</p>
      </div>

    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
